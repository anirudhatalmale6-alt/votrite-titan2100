name: Build VotRite V24.2
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Retarget to .NET Framework 4.6.2
        shell: powershell
        run: |
          $content = Get-Content VotRite.csproj -Raw
          $content = $content -replace '<TargetFrameworkVersion>v4\.0</TargetFrameworkVersion>', '<TargetFrameworkVersion>v4.6.2</TargetFrameworkVersion>'
          $content = $content -replace '<TargetFrameworkProfile />', ''
          Set-Content VotRite.csproj $content

      - name: Download CommonFiles
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/anirudhatalmale6-alt/votrite-titan2100/releases/download/v24.2/CommonFiles.zip" -OutFile CommonFiles.zip
          New-Item -ItemType Directory -Path bin\Debug -Force
          Expand-Archive CommonFiles.zip -DestinationPath bin\Debug -Force

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Install missing NuGet packages
        shell: powershell
        run: |
          nuget install iTextSharp -Version 5.5.13.3 -OutputDirectory packages
          nuget install EPPlus -Version 4.5.3.3 -OutputDirectory packages
          nuget install Microsoft.Office.Interop.Excel -Version 15.0.4795.1001 -OutputDirectory packages

      - name: Fix assembly references
        shell: powershell
        run: |
          $content = Get-Content VotRite.csproj -Raw
          # Fix EPPlus to NuGet path
          $content = $content -replace '<HintPath>.*?EPPlus\.dll</HintPath>', '<HintPath>packages\EPPlus.4.5.3.3\lib\net40\EPPlus.dll</HintPath>'
          # Fix iTextSharp to lib folder
          $content = $content -replace '<HintPath>.*?itextsharp\.dll</HintPath>', '<HintPath>lib\itextsharp.dll</HintPath>'
          # Fix GemBox to lib folder
          $content = $content -replace '<HintPath>.*?GemBox\.Spreadsheet\.dll</HintPath>', '<HintPath>lib\GemBox.Spreadsheet.dll</HintPath>'
          # Fix Interop Excel
          $content = $content -replace '<HintPath>.*?Interop\.Microsoft\.Office\.Interop\.Excel\.dll</HintPath>', '<HintPath>packages\Microsoft.Office.Interop.Excel.15.0.4795.1001\lib\net20\Microsoft.Office.Interop.Excel.dll</HintPath>'
          Set-Content VotRite.csproj $content

      - name: Restore NuGet packages
        run: nuget restore VotRiteEncrpted.sln

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release x86
        run: msbuild VotRite.csproj /p:Configuration=Release /p:Platform=x86 /p:OutputPath=bin\Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VotRite-V24.2-Release
          path: bin/Release/
