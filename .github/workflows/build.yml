name: Build VotRite V24.2
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Retarget to .NET Framework 4.6.2
        shell: powershell
        run: |
          $content = Get-Content VotRite.csproj -Raw
          $content = $content -replace '<TargetFrameworkVersion>v4\.0</TargetFrameworkVersion>', '<TargetFrameworkVersion>v4.6.2</TargetFrameworkVersion>'
          $content = $content -replace '<TargetFrameworkProfile />', ''
          Set-Content VotRite.csproj $content

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Install missing NuGet packages
        shell: powershell
        run: |
          nuget install iTextSharp -Version 5.5.13.3 -OutputDirectory packages
          nuget install EPPlus -Version 4.5.3.3 -OutputDirectory packages
          nuget install GemBox.Spreadsheet -Version 49.0.35.1335 -OutputDirectory packages

      - name: Fix assembly references
        shell: powershell
        run: |
          $content = Get-Content VotRite.csproj -Raw
          # Fix EPPlus
          $content = $content -replace '<HintPath>.*?EPPlus\.dll</HintPath>', '<HintPath>packages\EPPlus.4.5.3.3\lib\net40\EPPlus.dll</HintPath>'
          # Fix iTextSharp
          $content = $content -replace '<HintPath>.*?itextsharp\.dll</HintPath>', '<HintPath>packages\iTextSharp.5.5.13.3\lib\itextsharp.dll</HintPath>'
          # Fix GemBox
          $content = $content -replace '<HintPath>.*?GemBox\.Spreadsheet\.dll</HintPath>', '<HintPath>packages\GemBox.Spreadsheet.49.0.35.1335\lib\net35\GemBox.Spreadsheet.dll</HintPath>'
          # Fix Interop Excel - remove this reference, add via NuGet
          $content = $content -replace '<HintPath>.*?Interop\.Microsoft\.Office\.Interop\.Excel\.dll</HintPath>', '<HintPath>packages\MicrosoftOfficeCore.15.0.0\lib\net20\Microsoft.Office.Interop.Excel.dll</HintPath>'
          Set-Content VotRite.csproj $content

      - name: Restore NuGet packages
        run: nuget restore VotRiteEncrpted.sln

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release x86
        run: msbuild VotRite.csproj /p:Configuration=Release /p:Platform=x86 /p:OutputPath=bin\Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VotRite-V24.2-Release
          path: bin/Release/
