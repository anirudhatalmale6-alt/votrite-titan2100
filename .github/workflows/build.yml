name: Build VotRite V24.2
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Install .NET Framework 4.0 targeting pack
        shell: powershell
        run: |
          choco install netfx-4.0.3319-developerpack -y --no-progress 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Trying alternative: retargeting to 4.6.2"
            $content = Get-Content VotRite.csproj -Raw
            $content = $content -replace 'v4\.0', 'v4.6.2'
            Set-Content VotRite.csproj $content
          }

      - name: Restore NuGet packages
        run: nuget restore VotRiteEncrpted.sln

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release x86
        run: msbuild VotRite.csproj /p:Configuration=Release /p:Platform=x86 /p:OutputPath=bin\Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VotRite-V24.2-Release
          path: bin/Release/
